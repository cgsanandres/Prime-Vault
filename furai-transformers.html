<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Furai Hangar | PrimeVault Logistics</title>
    <style>
        :root {
            --bg-color: #0d0e10;
            --runner-grey: #464a4e;
            --plastic-red: #cc0000;
            --safety-yellow: #f9d71c;
            --panel-dark: #16181b;
            --pure-white: #ffffff;
            --text-sub: #b0b0b0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--pure-white);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- HEADER & NAVIGATION --- */
        header { background: var(--panel-dark); border-bottom: 5px solid var(--runner-grey); position: sticky; top: 0; z-index: 1000; }
        .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 15px 40px; max-width: 1400px; margin: 0 auto; }
        .logo { font-size: 26px; font-weight: 900; text-transform: uppercase; text-decoration: none; color: white; }
        .logo span { color: var(--plastic-red); }
        .search-container { flex-grow: 1; max-width: 650px; margin: 0 40px; }
        .search-bar { width: 100%; background: #000; border: 2px solid var(--runner-grey); padding: 12px 15px; color: white; border-radius: 4px; outline: none; font-size: 14px; }
        .user-actions { display: flex; gap: 20px; font-size: 22px; cursor: pointer; }

        /* --- CATALOG LAYOUT --- */
        .catalog-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 40px;
        }

        /* --- SIDEBAR FILTERS --- */
        .sidebar { background: var(--panel-dark); border-right: 2px solid var(--runner-grey); padding: 20px; height: fit-content; }
        .filter-group { margin-bottom: 25px; }
        .filter-group h4 { 
            text-transform: uppercase; 
            font-size: 13px; 
            border-bottom: 2px solid #000; 
            padding-bottom: 8px; 
            margin-bottom: 12px;
            color: var(--safety-yellow);
            font-weight: 900;
        }
        .filter-link { 
            display: block; 
            font-size: 13px; 
            color: var(--text-sub); 
            text-decoration: none; 
            margin-bottom: 8px; 
            cursor: pointer;
            transition: 0.2s;
        }
        .filter-link:hover { color: var(--pure-white); padding-left: 5px; border-left: 2px solid var(--plastic-red); }

        /* --- PRODUCT GRID --- */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }
        .product-card {
            background: var(--panel-dark);
            border: 2px solid var(--runner-grey);
            padding: 15px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
        }
        .product-card:hover { border-color: var(--safety-yellow); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
       
        .product-img { 
            width: 100%; 
            height: 220px; 
            background: #222; 
            margin-bottom: 15px; 
            position: relative; 
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            transition: transform 0.5s ease;
        }
        .product-card:hover .product-img img { transform: scale(1.1); }
        
        .product-img::after { content: 'FURAI MODEL'; position: absolute; bottom: 0; left: 0; background: rgba(204,0,0,0.8); padding: 4px 8px; font-size: 10px; font-weight: bold; z-index: 2; }
        
        .product-name { font-size: 14px; font-weight: 900; line-height: 1.4; margin-bottom: 10px; flex-grow: 1; }
        .product-price { color: var(--safety-yellow); font-weight: 900; font-size: 18px; }

       
        .applied-filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; min-height: 34px; align-items: center; }
        .filter-tag { background: var(--plastic-red); color: white; padding: 6px 12px; border-radius: 2px; font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
        .controls-bar { background: var(--panel-dark); padding: 15px 20px; border: 1px solid var(--runner-grey); display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: bold; }
        select, .inner-search { background: #000; color: white; border: 1px solid var(--runner-grey); padding: 8px; font-family: inherit; font-size: 12px; }
        .inner-search { width: 100%; box-sizing: border-box; margin-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <div class="top-bar">
        <a href="index.html" class="logo">Prime<span>Vault</span></a>
        <div class="search-container"><input type="text" class="search-bar" placeholder="Search Furai Hangar..."></div>
        <div class="user-actions"><span>👤</span> 🛒</div>
    </div>
</header>

<div class="catalog-container">
    <aside class="sidebar">
        <div class="filter-group">
            <h4>Search in results:</h4>
            <input type="text" class="inner-search" id="innerSearch" placeholder="Filter current view..." oninput="processFilters()">
        </div>

        <div class="filter-group">
            <h4>Faction</h4>
            <span class="filter-link" onclick="addFilter('series', 'Autobot')">Autobot</span>
            <span class="filter-link" onclick="addFilter('series', 'Decepticon')">Decepticon</span>
        </div>

        <div class="filter-group">
            <h4>Universe</h4>
            <span class="filter-link" onclick="addFilter('theme', 'IDW Comics')">IDW Comics</span>
            <span class="filter-link" onclick="addFilter('theme', 'G1 Style')">G1 Style</span>
        </div>
    </aside>

    <main>
        <div class="controls-wrapper">
            <div class="applied-filters" id="appliedFilters"></div>
            <div class="controls-bar">
                <div>Sort By: <select id="sortBy" onchange="processFilters()"><option value="name-a">Name: A to Z</option></select></div>
                <div>Per Page: <select id="perPage" onchange="processFilters()"><option value="12">12 Items</option></select></div>
            </div>
        </div>

        <div class="product-grid" id="productGrid"></div>
    </main>
</div>

<script>
    
    const furaiProducts = [
        { 
            id: 201, 
            name: "[Furai Model] Optimus Prime (Attack Mode)", 
            price: 40.00, 
            series: "Autobot", 
            theme: "IDW Comics",
            image: "https://images.unsplash.com/photo-1594787318286-3d835c1d207f?auto=format&fit=crop&q=80&w=400" 
        },
        { 
            id: 202, 
            name: "[Furai Model] Megatron (IDW Autobot Ver.)", 
            price: 50.00, 
            series: "Autobot", 
            theme: "IDW Comics",
            image: "https://images.unsplash.com/photo-1531259683007-016a7b628fc3?auto=format&fit=crop&q=80&w=400" 
        },
        { 
            id: 203, 
            name: "[Furai Model] Rodimus IDW Ver.", 
            price: 45.00, 
            series: "Autobot", 
            theme: "IDW Comics",
            image: "https://images.unsplash.com/photo-1626245915993-9e46a788225e?auto=format&fit=crop&q=80&w=400" 
        },
        { 
            id: 204, 
            name: "[Furai Model] Starscream G1 Ver.", 
            price: 38.00, 
            series: "Decepticon", 
            theme: "G1 Style",
            image: "https://images.unsplash.com/photo-1560419015-7c427e8ae5ba?auto=format&fit=crop&q=80&w=400" 
        },
        { 
            id: 205, 
            name: "[Furai Model] Devastator (Massive Builder)", 
            price: 90.00, 
            series: "Decepticon", 
            theme: "G1 Style",
            image: "https://images.unsplash.com/photo-1593305841991-05c297ba4575?auto=format&fit=crop&q=80&w=400" 
        }
		
		 
    ];

    let activeFilters = [];

    function addFilter(categoryKey, value) {
        if (!activeFilters.some(f => f.category === categoryKey && f.value === value)) {
            activeFilters.push({ category: categoryKey, value: value });
            processFilters();
        }
    }

    function removeFilter(categoryKey, value) {
        activeFilters = activeFilters.filter(f => !(f.category === categoryKey && f.value === value));
        processFilters();
    }

    function processFilters() {
        const searchTerm = document.getElementById('innerSearch').value.toLowerCase();
        let results = furaiProducts.filter(product => {
            const matchesSearch = product.name.toLowerCase().includes(searchTerm);
            const matchesTags = activeFilters.every(filter => product[filter.category] === filter.value);
            return matchesSearch && matchesTags;
        });
        renderUI(results);
    }

    function renderUI(filteredProducts) {
        const tagContainer = document.getElementById('appliedFilters');
        tagContainer.innerHTML = activeFilters.map(f => `
            <div class="filter-tag" onclick="removeFilter('${f.category}', '${f.value}')">
                ${f.value} <span>✖</span>
            </div>
        `).join('');

        const grid = document.getElementById('productGrid');
        
        
        grid.innerHTML = filteredProducts.map(p => `
            <a href="#" class="product-card">
                <div class="product-img">
                    <img src="${p.image}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/400x400?text=Model+In+Transit'">
                </div>
                <div class="product-name">${p.name}</div>
                <div class="product-price">$${p.price.toFixed(2)}</div>
            </a>
        `).join('');
    }

    document.addEventListener('DOMContentLoaded', processFilters);
</script>

</body>
</html>
