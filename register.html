<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIME VAULT | ACCESS TERMINAL - REGISTER</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"> <!-- Using Font Awesome for icons -->
    
    <style>
        :root {
            --vault-bg: #05070a;           /* Dark background like the main site */
            --panel-bg: #0d1117;          /* Slightly lighter panel background */
            --accent-gundam: #39d353;     /* V-Fin Green */
            --accent-zeon: #e63946;       /* Zeon Red */
            --accent-white: #f1faee;      /* Primary white text */
            --border-color: #30363d;      /* Border color from main site */
            --input-bg: #1a202c;          /* Darker input background */
            --primary-yellow: #FFCC00;    /* Kept for some accents if needed */
            --text-grey: #8b949e;         /* Grey text from main site */
        }

        body {
            background-color: var(--vault-bg);
            font-family: 'Rajdhani', sans-serif; /* Use the same font */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Changed to min-height for scroll on small screens */
            color: var(--accent-white); /* Default text color */
            overflow-x: hidden;
        }

        /* Loading Screen Transition */
        #loader {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--vault-bg);
            z-index: 999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s ease;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 5px solid var(--border-color); /* Use border color */
            border-top: 5px solid var(--accent-gundam); /* Gundam Green accent */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader-text {
            margin-top: 20px; 
            color: var(--accent-gundam); /* Gundam Green */
            letter-spacing: 2px; 
            font-size: 14px;
        }

        /* Card Design */
        .register-card {
            background-color: var(--panel-bg); /* Use panel background */
            padding: 35px; /* Slightly adjusted padding */
            border-radius: 12px; /* Slightly rounded corners */
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* Softer shadow */
            border: 1px solid var(--border-color); /* Add border */
            margin: 20px; /* Keep margin for small screens */
        }

        .icon-header {
            background-color: var(--accent-gundam); /* Gundam Green */
            width: 65px; height: 65px; border-radius: 50%;
            display: inline-flex; justify-content: center; align-items: center;
            font-size: 32px; color: #0d1117; /* Dark panel bg for contrast */
            margin-bottom: 20px;
            border: 2px solid var(--accent-white); /* White border */
        }

        h2 { 
            margin: 0 0 8px; 
            font-weight: 700; 
            font-size: 30px; /* Larger title */
            letter-spacing: 2px;
            color: var(--accent-gundam); /* Gundam Green */
            text-transform: uppercase;
        }
        .subtitle { 
            color: var(--text-grey); 
            font-size: 13px; 
            margin-bottom: 25px; 
            letter-spacing: 1px;
        }

        /* Form Styling */
        .input-group { text-align: left; margin-bottom: 18px; }
        label { 
            display: block; 
            font-size: 12px; 
            color: var(--accent-gundam); /* Gundam Green label */
            margin-bottom: 6px; 
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        input {
            width: 100%; padding: 12px; background: var(--input-bg);
            border: 1px solid var(--border-color); /* Use border color */
            border-radius: 8px; color: var(--accent-white);
            box-sizing: border-box; outline: none; transition: 0.2s;
            font-family: 'Rajdhani', sans-serif; /* Ensure font consistency */
            font-size: 14px;
        }
        input:focus { border-color: var(--accent-gundam); box-shadow: 0 0 10px rgba(57, 211, 83, 0.4); }

        .signup-btn {
            background-color: var(--accent-gundam); color: #0d1117; /* Dark panel bg */
            width: 100%; padding: 14px; border: none; border-radius: 8px;
            font-weight: 700; cursor: pointer; font-size: 16px;
            letter-spacing: 1px;
            transition: 0.2s;
        }
        .signup-btn:hover { background-color: #32cd5a; /* Slightly brighter green */ }

        /* Divider */
        .divider { margin: 25px 0; border-bottom: 1px solid var(--border-color); position: relative; }
        .divider span {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            background: var(--panel-bg); padding: 0 15px; color: var(--text-grey); font-size: 12px;
        }

        /* Social Buttons */
        .social-btn {
            width: 100%; padding: 12px; border-radius: 8px; margin-bottom: 12px;
            display: flex; justify-content: center; align-items: center;
            gap: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border-color);
            font-size: 14px; transition: 0.2s;
            background: var(--input-bg); /* Use input background */
            color: var(--accent-white);
        }
        .social-btn:hover { background: var(--panel-bg); border-color: var(--accent-gundam); }
        .social-logo { width: 20px; height: 20px; object-fit: contain; }

        /* Footer Link */
        .footer-link { font-size: 13px; color: var(--text-grey); margin-top: 25px; }
        .footer-link a {
            color: var(--accent-gundam); /* Link color */
            text-decoration: none;
            font-weight: 700;
        }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="spinner"></div>
        <p class="loader-text">CREATING ACCOUNT...</p>
    </div>

    <!-- Register Card -->
    <div class="register-card" id="registerCard">
        <div class="icon-header"><i class="fa-solid fa-user-plus"></i></div>
        <h2>CREATE YOUR ACCESS</h2>
        <p class="subtitle">Establish your collector credentials</p>

        <form id="registerForm">
            <div class="input-group">
                <label>OPERATIVE NAME</label>
                <input type="text" placeholder="Enter your designation" required>
            </div>

            <div class="input-group">
                <label>ACCESS ID</label>
                <input type="email" placeholder="Enter your ID" required>
            </div>

            <div class="input-group">
                <label>PASSCODE</label>
                <input type="password" placeholder="Min. 8 characters" required>
            </div>

            <button type="submit" class="signup-btn">REGISTER ACCESS</button>
        </form>

        <div class="divider"><span>OR CONNECT VIA</span></div>

        <button class="social-btn google-btn" onclick="handleSocial('Google')">
            <img src="images/goog.png" alt="G" class="social-logo"> Google
        </button>

        <button class="social-btn apple-btn" onclick="handleSocial('Apple')">
            <img src="images/apple.jpeg" alt="A" class="social-logo"> Apple
        </button>

        <p class="footer-link">
            Existing operative? <a href="login.html">Return to Terminal</a>
        </p>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const loader = document.getElementById('loader');
        const card = document.getElementById('registerCard');

        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            processRegistration();
        });

        function handleSocial(p) { processRegistration(); }

        function processRegistration() {
            card.style.opacity = '0';
            card.style.transform = 'scale(0.9)';
            card.style.transition = '0.4s ease';

            setTimeout(() => {
                card.style.display = 'none';
                loader.style.display = 'flex';

                // After 2 seconds, redirect to LOGIN page
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            }, 400);
        }
    </script>
</body>
</html>
