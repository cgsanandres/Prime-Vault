<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Vault | Register</title>
    <!-- Fonts & Icons -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        :root {
            --primary-yellow: #FFCC00;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --input-bg: #2a2a2a;
            --text-white: #ffffff;
            --text-grey: #888888;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Changed to min-height for scroll on small screens */
            color: var(--text-white);
            overflow-x: hidden;
        }

        /* Loading Screen Transition */
        #loader {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #333;
            border-top: 5px solid var(--primary-yellow);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Card Design */
        .register-card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            margin: 20px;
        }

        .icon-header {
            background-color: var(--primary-yellow);
            width: 65px; height: 65px; border-radius: 50%;
            display: inline-flex; justify-content: center; align-items: center;
            font-size: 32px; color: #121212; margin-bottom: 20px;
        }

        h2 { margin: 0 0 10px; font-weight: 600; }
        .subtitle { color: var(--text-grey); font-size: 14px; margin-bottom: 30px; }

        /* Form Styling */
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #bbb; margin-bottom: 6px; }
        
        input {
            width: 100%; padding: 12px; background: var(--input-bg);
            border: 1px solid #333; border-radius: 8px; color: white;
            box-sizing: border-box; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--primary-yellow); }

        .signup-btn {
            background-color: var(--primary-yellow); color: #000;
            width: 100%; padding: 14px; border: none; border-radius: 8px;
            font-weight: 600; cursor: pointer; font-size: 16px; margin-top: 10px;
        }
        .signup-btn:hover { background-color: #e6b800; }

        .divider { margin: 25px 0; border-bottom: 1px solid #333; position: relative; }
        .divider span {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            background: var(--card-bg); padding: 0 15px; color: #555; font-size: 12px;
        }

        .social-btn {
            width: 100%; padding: 12px; border-radius: 8px; margin-bottom: 10px;
            display: flex; justify-content: center; align-items: center;
            gap: 12px; font-weight: 500; cursor: pointer; border: 1px solid transparent;
            font-size: 14px;
        }
        .social-logo { width: 18px; height: 18px; object-fit: contain; }

        .google-btn { background: #ffffff; color: #000; }
        .apple-btn { background: #000000; color: #ffffff; border: 1px solid #333; }

        .footer-link { font-size: 13px; color: var(--text-grey); margin-top: 25px; }
        .footer-link a { color: var(--primary-yellow); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 20px; color: var(--primary-yellow);">CREATING ACCOUNT...</p>
    </div>

    <!-- Register Card -->
    <div class="register-card" id="registerCard">
        <div class="icon-header"><i class="fa-solid fa-user-plus"></i></div>
        <h2>Create Account</h2>
        <p class="subtitle">Join the collector community</p>

        <form id="registerForm">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" placeholder="John Doe" required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="collector@example.com" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Min. 8 characters" required>
            </div>

            <button type="submit" class="signup-btn">Sign Up</button>
        </form>

        <div class="divider"><span>Or join with</span></div>

        <button class="social-btn google-btn" onclick="handleSocial('Google')">
            <img src="google-logo.png" alt="G" class="social-logo"> Google
        </button>

        <button class="social-btn apple-btn" onclick="handleSocial('Apple')">
            <img src="apple-logo.png" alt="A" class="social-logo"> Apple
        </button>

        <p class="footer-link">
            Already have an account? <a href="login.html">Login here</a>
        </p>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const loader = document.getElementById('loader');
        const card = document.getElementById('registerCard');

        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            processRegistration();
        });

        function handleSocial(p) { processRegistration(); }

        function processRegistration() {
            card.style.opacity = '0';
            card.style.transform = 'scale(0.9)';
            card.style.transition = '0.4s ease';

            setTimeout(() => {
                card.style.display = 'none';
                loader.style.display = 'flex';

                // After 2 seconds, redirect to LOGIN page
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            }, 400);
        }
    </script>
</body>
</html>
