<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeVault - Register Hangar</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="primevault_logo.png" alt="PrimeVault Logo" class="login-logo">
            <h1>Register Hangar</h1>
            <p>Join the ranks, pilot! Create your PrimeVault account.</p>
        </div>

        <form class="register-form" id="registerForm">
            <div class="form-group">
                <label for="newCallsign">Callsign</label>
                <input type="text" id="newCallsign" name="newCallsign" required placeholder="Choose your unique Callsign">
            </div>
            <div class="form-group">
                <label for="newEmail">Email Address</label>
                <input type="email" id="newEmail" name="newEmail" required placeholder="Enter your valid Email Address">
            </div>
            <div class="form-group">
                <label for="newPassword">Security Code</label>
                <input type="password" id="newPassword" name="newPassword" required placeholder="Create a strong Security Code">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Security Code</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Re-enter your Security Code">
            </div>

            <button type="submit" class="login-button">Establish Hangar</button>
        </form>

        <div class="social-login">
            <p>Or register via comms:</p>
            <div class="social-buttons">
                <button class="social-button google-login">
                    <img src="google_logo.png" alt="Google Logo" class="social-icon">
                    <span>Google Comms</span>
                </button>
                <button class="social-button apple-login">
                    <img src="apple_logo.png" alt="Apple Logo" class="social-icon">
                    <span>Apple Protocols</span>
                </button>
            </div>
        </div>

        <div class="create-account">
            <p>Already a Pilot?</p>
            <a href="login.html">Access Hangar</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
