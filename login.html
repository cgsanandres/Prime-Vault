<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeVault - Pilot Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="primevault_logo.png" alt="PrimeVault Logo" class="login-logo">
            <h1>Pilot Login</h1>
            <p>Access your Hangar and manage your arsenal.</p>
        </div>

        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label for="usernameEmail">Callsign or Email</label>
                <input type="text" id="usernameEmail" name="usernameEmail" required placeholder="Enter your Callsign or Email">
            </div>
            <div class="form-group">
                <label for="password">Security Code</label>
                <input type="password" id="password" name="password" required placeholder="Enter your Security Code">
            </div>

            <div class="form-options">
                <div class="remember-me">
                    <input type="checkbox" id="keepHangarOpen" name="keepHangarOpen">
                    <label for="keepHangarOpen">Keep Hangar Doors Open</label>
                </div>
                <a href="forgot-password.html" class="forgot-password">Lost Security Code?</a>
            </div>

            <button type="submit" class="login-button">Engage!</button>
        </form>

        <div class="social-login">
            <p>Or log in via comms:</p>
            <div class="social-buttons">
                <button class="social-button google-login">
                    <img src="google_logo.png" alt="Google Logo" class="social-icon">
                    <span>Google Comms</span>
                </button>
                <button class="social-button apple-login">
                    <img src="apple_logo.png" alt="Apple Logo" class="social-icon">
                    <span>Apple Protocols</span>
                </button>
            </div>
        </div>

        <div class="create-account">
            <p>New Pilot?</p>
            <a href="register.html">Register for a Hangar</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
