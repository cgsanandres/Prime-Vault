<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeVault | Sign In</title>
<style>
    body {
        background-color: #121212;
        color: #ffffff;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }
    .auth-wrapper {
        background-color: #1e1e1e;
        padding: 40px;
        border-radius: 8px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.6);
        width: 100%;
        max-width: 420px;
        border-top: 4px solid #cc0000;
        box-sizing: border-box;
    }
    .brand-title {
        font-size: 32px;
        font-weight: 800;
        text-align: center;
        margin-bottom: 30px;
        color: #ffffff;
        letter-spacing: 1px;
    }
    .brand-title span {
        color: #cc0000;
    }
    .input-group {
        margin-bottom: 20px;
    }
    label {
        display: block;
        margin-bottom: 8px;
        font-size: 13px;
        color: #b3b3b3;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    input[type="text"], input[type="password"] {
        width: 100%;
        padding: 14px;
        background-color: #2a2a2a;
        border: 1px solid #333;
        border-radius: 4px;
        color: #ffffff;
        box-sizing: border-box;
        font-size: 15px;
        outline: none;
        transition: border-color 0.2s ease;
    }
    input[type="text"]:focus, input[type="password"]:focus {
        border-color: #cc0000;
    }
    .options-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
        font-size: 14px;
    }
    .checkbox-container {
        display: flex;
        align-items: center;
        color: #b3b3b3;
        text-transform: none;
        cursor: pointer;
    }
    .checkbox-container input {
        margin-right: 8px;
        cursor: pointer;
    }
    .action-link {
        color: #cc0000;
        text-decoration: none;
        transition: color 0.2s ease;
    }
    .action-link:hover {
        color: #ff3333;
    }
    .primary-btn {
        width: 100%;
        padding: 15px;
        background-color: #cc0000;
        color: #ffffff;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.2s ease;
    }
    .primary-btn:hover {
        background-color: #a30000;
    }
    .separator {
        margin: 30px 0;
        text-align: center;
        border-bottom: 1px solid #333;
        line-height: 0.1em;
    }
    .separator span {
        background: #1e1e1e;
        padding: 0 15px;
        color: #666;
        font-size: 12px;
    }
    .social-btn {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border: 1px solid #444;
        border-radius: 4px;
        background-color: transparent;
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 15px;
        font-weight: 500;
        transition: background-color 0.2s ease;
    }
    .social-btn:hover {
        background-color: #2a2a2a;
    }
    .social-btn img {
        height: 20px;
        margin-right: 12px;
    }
    .apple-btn img {
        filter: invert(1);
    }
    .footer-text {
        text-align: center;
        margin-top: 25px;
        font-size: 14px;
        color: #b3b3b3;
    }
    .footer-text a {
        color: #cc0000;
        text-decoration: none;
        font-weight: bold;
    }
    .footer-text a:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>

<div class="auth-wrapper">
    <div class="brand-title">Prime<span>Vault</span></div>
    
    <form id="loginForm">
        <div class="input-group">
            <label for="identifier">Email or Username</label>
            <input type="text" id="identifier" required>
        </div>
        
        <div class="input-group">
            <label for="passkey">Password</label>
            <input type="password" id="passkey" required>
        </div>
        
        <div class="options-row">
            <label class="checkbox-container">
                <input type="checkbox" id="rememberBox"> Remember me
            </label>
            <a href="forgot-password.html" class="action-link">Forgot Password?</a>
        </div>
        
        <button type="submit" class="primary-btn">Sign In</button>
    </form>
    
    <div class="separator"><span>OR CONTINUE WITH</span></div>
    
    <button class="social-btn google-btn" onclick="handleSocial('Google')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo">
        Sign in with Google
    </button>
    
    <button class="social-btn apple-btn" onclick="handleSocial('Apple')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple Logo">
        Sign in with Apple
    </button>
    
    <div class="footer-text">
        Don't have an account? <a href="register.html">Create New Account</a>
    </div>
</div>

<script>
window.onload = function() {
    let savedData = localStorage.getItem("primeVaultPilot");
    if (savedData) {
        document.getElementById("identifier").value = savedData;
        document.getElementById("rememberBox").checked = true;
    }
};

document.getElementById("loginForm").addEventListener("submit", function(event) {
    event.preventDefault();
    
    let userVal = document.getElementById("identifier").value.trim();
    let passVal = document.getElementById("passkey").value.trim();
    
    if (userVal === "" || passVal === "") {
        alert("Authentication failed: Please provide both an email/username and a password.");
        return;
    }
    
    let rememberChecked = document.getElementById("rememberBox").checked;
    
    if (rememberChecked) {
        localStorage.setItem("primeVaultPilot", userVal);
    } else {
        localStorage.removeItem("primeVaultPilot");
    }
    
    window.location.href = "index.html";
});

function handleSocial(platform) {
    alert("Authenticating with " + platform + " secure servers...");
    window.location.href = "index.html";
}
</script>

</body>
</html>
