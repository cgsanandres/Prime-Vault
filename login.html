<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Vault | Login</title>
    <!-- Fonts & Icons -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        :root {
            --primary-yellow: #FFCC00;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --input-bg: #2a2a2a;
            --text-white: #ffffff;
            --text-grey: #888888;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-white);
            overflow: hidden;
        }

        /* Loading Screen Transition */
        #loader {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #333;
            border-top: 5px solid var(--primary-yellow);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Login Card Design */
        .login-card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .avatar-circle {
            background-color: var(--primary-yellow);
            width: 65px; height: 65px; border-radius: 50%;
            display: inline-flex; justify-content: center; align-items: center;
            font-size: 32px; color: #121212; margin-bottom: 20px;
        }

        h2 { margin: 0 0 10px; font-weight: 600; }
        .subtitle { color: var(--text-grey); font-size: 14px; margin-bottom: 30px; }

        /* Form Styling */
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 13px; color: #bbb; margin-bottom: 8px; }
        
        input {
            width: 100%; padding: 14px; background: var(--input-bg);
            border: 1px solid #333; border-radius: 8px; color: white;
            box-sizing: border-box; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--primary-yellow); }

        .form-options {
            display: flex; justify-content: space-between;
            font-size: 12px; color: var(--text-grey); margin-bottom: 25px;
        }

        .login-btn {
            background-color: var(--primary-yellow); color: #000;
            width: 100%; padding: 15px; border: none; border-radius: 8px;
            font-weight: 600; cursor: pointer; font-size: 16px;
        }
        .login-btn:hover { background-color: #e6b800; }

        /* Social Divider */
        .divider { margin: 30px 0; border-bottom: 1px solid #333; position: relative; }
        .divider span {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            background: var(--card-bg); padding: 0 15px; color: #555; font-size: 12px;
        }

        /* Social Buttons */
        .social-btn {
            width: 100%; padding: 12px; border-radius: 8px; margin-bottom: 12px;
            display: flex; justify-content: center; align-items: center;
            gap: 12px; font-weight: 500; cursor: pointer; border: 1px solid transparent;
            font-size: 14px; transition: 0.2s;
        }
        .social-logo { width: 20px; height: 20px; object-fit: contain; }

        .google-btn { background: #ffffff; color: #000; }
        .apple-btn { background: #000000; color: #ffffff; border: 1px solid #333; }

        /* Footer Buttons */
        .footer-text { font-size: 13px; color: var(--text-grey); margin-top: 30px; }
        .create-btn {
            background: transparent; border: 1px solid var(--primary-yellow);
            color: var(--primary-yellow); padding: 12px; width: 100%;
            margin-top: 15px; border-radius: 8px; cursor: pointer; font-weight: 600;
        }
        .create-btn:hover { background: rgba(255, 204, 0, 0.1); }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 20px; color: var(--primary-yellow); letter-spacing: 1px;">AUTHENTICATING...</p>
    </div>

    <!-- Login Card -->
    <div class="login-card" id="loginCard">
        <div class="avatar-circle"><i class="fa-solid fa-user"></i></div>
        <h2>Prime's Login</h2>
        <p class="subtitle">Access your action figure collection</p>

        <form id="loginForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="userEmail" placeholder="collector@example.com" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="userPass" placeholder="Enter your password" required>
            </div>

            <div class="form-options">
                <label style="cursor:pointer"><input type="checkbox"> Remember Me</label>
                <a href="#" style="color: var(--text-grey); text-decoration: none;">Forgot Password?</a>
            </div>

            <button type="submit" class="login-btn">Login to Collection</button>
        </form>

        <div class="divider"><span>Or sign in with</span></div>

        <button class="social-btn google-btn" onclick="handleSocialLogin('Google')">
            <img src="images/goog.png" alt="G" class="social-logo"> Continue with Google
        </button>

        <button class="social-btn apple-btn" onclick="handleSocialLogin('Apple')">
            <img src="images/apple.jpeg" alt="A" class="social-logo"> Continue with Apple
        </button>

        <p class="footer-text">Don't have an account?</p>
       
        <button class="create-btn" onclick="window.location.href='register.html'">Create an Account</button>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loader = document.getElementById('loader');
        const loginCard = document.getElementById('loginCard');

       
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault(); 
            startLoginProcess();
        });

       
        function handleSocialLogin(provider) {
            console.log("Logging in with " + provider);
            startLoginProcess();
        }

        
        function startLoginProcess() {
           
            loginCard.style.opacity = '0';
            loginCard.style.transform = 'scale(0.9)';
            loginCard.style.transition = '0.4s ease';

            setTimeout(() => {
                loginCard.style.display = 'none';
                loader.style.display = 'flex';

                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }, 400);
        }
    </script>
</body>
</html>
