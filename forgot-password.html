<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeVault - Lost Security Code</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="primevault_logo.png" alt="PrimeVault Logo" class="login-logo">
            <h1>Lost Security Code?</h1>
            <p>Don't worry, pilot. We'll help you reset your access.</p>
        </div>

        <form class="forgot-password-form" id="forgotPasswordForm">
            <div class="form-group">
                <label for="emailReset">Callsign or Email</label>
                <input type="text" id="emailReset" name="emailReset" required placeholder="Enter your Callsign or Email">
            </div>

            <button type="submit" class="login-button">Request Reset Link</button>
        </form>

        <div class="create-account">
            <p>Remembered your Security Code?</p>
            <a href="login.html">Access Hangar</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
